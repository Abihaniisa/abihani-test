<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Test</title>
</head>
<body>

    <h2>Send Feedback</h2>
    <input type="text" id="fb-name" placeholder="Name"><br><br>
    <textarea id="fb-message" placeholder="Message"></textarea><br><br>
    <button onclick="sendFeedback()">Submit Feedback</button>
    <pre id="fb-status"></pre>

    <hr>

    <h2>Send Email to Customer</h2>
    <input type="text" id="cust-email" placeholder="Customer Email"><br><br>
    <input type="text" id="cust-subject" placeholder="Subject"><br><br>
    <textarea id="cust-message" placeholder="Message"></textarea><br><br>
    <button onclick="sendToCustomer()">Send Email</button>
    <pre id="cust-status"></pre>

    <script>
    async function sendEmailAPI(to, subject, message, el) {
        el.textContent = 'Sending...';
        try {
            var r = await fetch('/api/send-email', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ to: to, subject: subject, html: '<p>' + message.replace(/\n/g, '<br>') + '</p>' })
            });
            var t = await r.text();
            el.textContent = 'Status: ' + r.status + '\n' + t;
        } catch(e) {
            el.textContent = 'Error: ' + e.message;
        }
    }

    function sendFeedback() {
        var n = document.getElementById('fb-name').value || 'Anonymous';
        var m = document.getElementById('fb-message').value;
        if (!m) { alert('Enter message'); return; }
        sendEmailAPI('bayeroisa2003@gmail.com', 'Feedback from ' + n, 'Name: ' + n + '\n\n' + m, document.getElementById('fb-status'));
    }

    function sendToCustomer() {
        var e = document.getElementById('cust-email').value;
        var s = document.getElementById('cust-subject').value;
        var m = document.getElementById('cust-message').value;
        if (!e || !s || !m) { alert('Fill all fields'); return; }
        sendEmailAPI(e, s, m, document.getElementById('cust-status'));
    }
    </script>

</body>
</html>

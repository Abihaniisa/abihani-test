<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Test</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <h2>PWA Test</h2>
    <p id="status">Checking...</p>
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js').then(function() {
                document.getElementById('status').textContent = '✅ SW Registered. Install should be available in Chrome menu.';
            }).catch(function(e) {
                document.getElementById('status').textContent = '❌ SW Error: ' + e;
            });
        });
    } else {
        document.getElementById('status').textContent = '❌ No SW support.';
    }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Test · Abihani Express</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#fdf9f5;color:#2c2418;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{background:#fff;border-radius:20px;padding:32px;max-width:500px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.08);border:1px solid #e8dfd6}
        .card h3{color:#b87c4f;margin-bottom:16px;text-align:center;font-size:22px}
        label{font-size:12px;font-weight:600;color:#6b5a4a;display:block;margin-top:12px}
        input,textarea,select{width:100%;padding:12px 16px;border:1px solid #e8dfd6;border-radius:12px;font-size:14px;margin:6px 0;background:#fdf9f5;color:#2c2418;font-family:inherit}
        input:focus,textarea:focus,select:focus{outline:none;border-color:#b87c4f}
        button{padding:14px;border-radius:30px;font-weight:600;cursor:pointer;font-size:15px;border:none;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
        .btn-primary{background:#b87c4f;color:#fff}
        .btn-accent{background:#25D366;color:#fff}
        .status{font-size:13px;margin-top:12px;text-align:center;min-height:20px;font-weight:500}
        .status.success{color:#27ae60}.status.error{color:#e74c3c}.status.info{color:#2980b9}
        .tabs{display:flex;gap:8px;margin-bottom:16px}
        .tab{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #e8dfd6;background:#fff;color:#6b5a4a}
        .tab.active{background:#b87c4f;color:#fff;border-color:#b87c4f}
        hr{margin:20px 0;border-color:#e8dfd6}
        .result-box{background:#f5efe8;border-radius:12px;padding:16px;margin-top:12px;font-size:12px;word-break:break-all;max-height:200px;overflow-y:auto}
        .result-box.success{border-left:4px solid #27ae60}
        .result-box.error{border-left:4px solid #e74c3c}
    </style>
</head>
<body>
<div class="card">
    <h3>✉️ Email Sending Test</h3>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('api')">Via API Route</div>
        <div class="tab" onclick="switchTab('direct')">Direct Resend</div>
    </div>

    <!-- Via API Route -->
    <div id="tab-api">
        <label>To</label><input type="email" id="api-to" placeholder="recipient@example.com" value="bayeroisa2003@gmail.com">
        <label>Subject</label><input id="api-subject" placeholder="Subject" value="Test Email from Abihani Express">
        <label>Message</label><textarea id="api-message" placeholder="Your message..." rows="3">This is a test email sent from the Abihani Express admin panel. If you see this, email sending is working! 🤎</textarea>
        <button class="btn-primary" id="api-btn" onclick="sendViaAPI()">📤 Send via API Route</button>
        <div class="status" id="api-status"></div>
        <div class="result-box" id="api-result" style="display:none"></div>
    </div>

    <!-- Direct Resend -->
    <div id="tab-direct" style="display:none">
        <label>To</label><input type="email" id="direct-to" placeholder="recipient@example.com" value="bayeroisa2003@gmail.com">
        <label>Subject</label><input id="direct-subject" placeholder="Subject" value="Test Email (Direct Resend)">
        <label>Message</label><textarea id="direct-message" placeholder="Your message..." rows="3">This email was sent directly via the Resend API without going through the Vercel serverless function.</textarea>
        <button class="btn-accent" id="direct-btn" onclick="sendDirect()">📤 Send Direct via Resend</button>
        <div class="status" id="direct-status"></div>
        <div class="result-box" id="direct-result" style="display:none"></div>
    </div>

    <hr>
    <p style="font-size:11px;color:#a6947e;text-align:center">Abihani Express · Email Diagnostic Tool</p>
</div>

<script>
var RESEND_KEY = 're_gwvYG6oG_7GbFqxZTBcSQ8gdjYUCFHjQi';
var FROM = 'Abihani Express <support@abihaniexpress.com.ng>';
var currentTab = 'api';

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.getElementById('tab-api').style.display = tab === 'api' ? 'block' : 'none';
    document.getElementById('tab-direct').style.display = tab === 'direct' ? 'block' : 'none';
    if (tab === 'api') document.querySelectorAll('.tab')[0].classList.add('active');
    else document.querySelectorAll('.tab')[1].classList.add('active');
}

// METHOD 1: Via Vercel API Route (what your app uses)
async function sendViaAPI() {
    var to = document.getElementById('api-to').value.trim();
    var subject = document.getElementById('api-subject').value.trim();
    var message = document.getElementById('api-message').value.trim();
    var btn = document.getElementById('api-btn');
    var status = document.getElementById('api-status');
    var resultBox = document.getElementById('api-result');
    
    if (!to || !subject || !message) {
        status.textContent = '⚠️ All fields required';
        status.className = 'status error';
        return;
    }
    
    btn.disabled = true;
    btn.innerHTML = '⏳ Sending...';
    status.textContent = '';
    status.className = 'status';
    resultBox.style.display = 'none';
    
    var htmlBody = '<div style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;padding:20px;background:#fdf9f5;">';
    htmlBody += '<div style="text-align:center;padding:20px 0;"><h1 style="color:#b87c4f;font-family:Georgia,serif;">Abihani Express</h1></div>';
    htmlBody += '<div style="background:#fff;border-radius:12px;padding:24px;">';
    htmlBody += '<p>' + message.replace(/\n/g, '<br>') + '</p></div>';
    htmlBody += '<hr style="border-color:#e8dfd6;"><p style="font-size:11px;color:#a6947e;">Abihani Isa · Founder & CEO<br>www.abihaniexpress.com.ng</p></div>';
    
    try {
        var response = await fetch('/api/send-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ to: to, subject: subject, html: htmlBody })
        });
        var data = await response.json();
        resultBox.style.display = 'block';
        resultBox.textContent = 'Status: ' + response.status + '\n\n' + JSON.stringify(data, null, 2);
        
        if (response.ok) {
            status.textContent = '✅ Email sent successfully! Check inbox.';
            status.className = 'status success';
            resultBox.className = 'result-box success';
        } else {
            status.textContent = '❌ Failed: ' + (data.error || 'Unknown error');
            status.className = 'status error';
            resultBox.className = 'result-box error';
        }
    } catch(e) {
        resultBox.style.display = 'block';
        resultBox.textContent = 'Error: ' + e.message;
        resultBox.className = 'result-box error';
        status.textContent = '❌ Network error: ' + e.message;
        status.className = 'status error';
    }
    
    btn.disabled = false;
    btn.innerHTML = '📤 Send via API Route';
}

// METHOD 2: Direct Resend API (bypasses Vercel entirely)
async function sendDirect() {
    var to = document.getElementById('direct-to').value.trim();
    var subject = document.getElementById('direct-subject').value.trim();
    var message = document.getElementById('direct-message').value.trim();
    var btn = document.getElementById('direct-btn');
    var status = document.getElementById('direct-status');
    var resultBox = document.getElementById('direct-result');
    
    if (!to || !subject || !message) {
        status.textContent = '⚠️ All fields required';
        status.className = 'status error';
        return;
    }
    
    btn.disabled = true;
    btn.innerHTML = '⏳ Sending directly...';
    status.textContent = '';
    status.className = 'status';
    resultBox.style.display = 'none';
    
    var htmlBody = '<div style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;padding:20px;background:#fdf9f5;">';
    htmlBody += '<div style="text-align:center;padding:20px 0;"><h1 style="color:#b87c4f;font-family:Georgia,serif;">Abihani Express</h1></div>';
    htmlBody += '<div style="background:#fff;border-radius:12px;padding:24px;">';
    htmlBody += '<p>' + message.replace(/\n/g, '<br>') + '</p></div>';
    htmlBody += '<hr style="border-color:#e8dfd6;"><p style="font-size:11px;color:#a6947e;">Abihani Isa · Founder & CEO<br>www.abihaniexpress.com.ng</p></div>';
    
    try {
        var response = await fetch('https://api.resend.com/emails', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + RESEND_KEY
            },
            body: JSON.stringify({
                from: FROM,
                to: [to],
                subject: subject,
                html: htmlBody,
                reply_to: 'bayeroisa2003@gmail.com'
            })
        });
        var data = await response.json();
        resultBox.style.display = 'block';
        resultBox.textContent = 'Status: ' + response.status + '\n\n' + JSON.stringify(data, null, 2);
        
        if (response.ok) {
            status.textContent = '✅ Email sent directly! Check inbox.';
            status.className = 'status success';
            resultBox.className = 'result-box success';
        } else {
            status.textContent = '❌ Failed: ' + (data.message || 'Unknown error');
            status.className = 'status error';
            resultBox.className = 'result-box error';
        }
    } catch(e) {
        resultBox.style.display = 'block';
        resultBox.textContent = 'Error: ' + e.message;
        resultBox.className = 'result-box error';
        status.textContent = '❌ Network error: ' + e.message;
        status.className = 'status error';
    }
    
    btn.disabled = false;
    btn.innerHTML = '📤 Send Direct via Resend';
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abihani Express - Status Share Test</title>
    <style>
        :root {
            --accent: #b76e3c;
        }
        body {
            font-family: sans-serif;
            padding: 10px;
        }
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            margin: 3px 0;
        }
        button:hover {
            filter: brightness(1.1);
        }
        h3, h4 {
            color: var(--accent);
        }
        .btn-wa {
            background: #25D366;
        }
        .btn-status {
            background: #128C7E;
        }
        .btn-delete {
            background: #e74c3c;
        }
        .product-card {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .admin-badge {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 6px;
        }
        #status-preview {
            background: #dcf8c6;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
            font-size: 14px;
            max-width: 300px;
            position: relative;
        }
        #status-preview:before {
            content: 'Status Preview';
            position: absolute;
            top: -10px;
            left: 10px;
            background: #128C7E;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <h3>Abihani Express - Admin Status Share</h3>
    
    <div id="product-list">LOADING PRODUCTS...</div>
    
    <hr>
    
    <div id="admin-section">
        <p id="login-status">Not logged in</p>
        <button id="show-login-btn" onclick="showLoginForm()">Admin Login</button>
        
        <div id="login-form" style="display:none; margin:10px 0;">
            <input type="email" id="login-email" placeholder="Email" value="bayeroisa2003@gmail.com"><br>
            <input type="password" id="login-password" placeholder="Password"><br>
            <button onclick="doLogin()">Log In</button>
            <p id="login-error" style="color:red;"></p>
        </div>
        
        <div id="admin-panel" style="display:none; margin:10px 0;">
            <p id="admin-welcome"></p>
            <button onclick="doLogout()">Logout</button>
            <hr>
            <h4>Share to WhatsApp Status</h4>
            <p>Click <b>"Share to Status"</b> on any product below. A popup will show you what the status will look like. Then click send.</p>
            
            <!-- Status Preview Box -->
            <div id="status-preview">
                <p id="status-text"></p>
                <small id="status-link"></small>
            </div>
            <button id="status-send-btn" class="btn-status" onclick="sendToStatus()" style="display:none;">📤 Send to My Status</button>
            <button id="status-cancel-btn" class="btn-delete" onclick="cancelStatus()" style="display:none;">Cancel</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
    <script>
        var supabaseUrl = 'https://eljgjxoptjxwdpuvzkpp.supabase.co';
        var supabaseKey = 'sb_publishable_RYlO1vwmzFViNl_68dDQ3Q_IfsRPIxZ';
        var supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        var isLoggedIn = false;
        var currentUser = null;
        var statusProduct = null;
        var currentDomain = window.location.origin;

        // === LOAD PRODUCTS ===
        async function loadProducts() {
            var result = await supabase.from('products').select('*').order('id', { ascending: false });

            if (result.error) {
                document.getElementById('product-list').textContent = 'Error: ' + result.error.message;
                return;
            }

            var products = result.data;
            
            if (!products || products.length === 0) {
                document.getElementById('product-list').textContent = 'No products yet.';
                return;
            }

            var html = '';
            for (var i = 0; i < products.length; i++) {
                var p = products[i];
                var imageHtml = p.image_url 
                    ? '<img src="' + p.image_url + '" alt="' + p.name + '" style="max-width:200px;border-radius:12px;display:block;margin-bottom:8px;">'
                    : '<p>No image</p>';
                
                html += '<div class="product-card">' +
                    '<strong>#' + p.id + ' - ' + p.name + '</strong>' +
                    '<p>Price: ₦' + (p.price || 'N/A') + '</p>' +
                    imageHtml +
                    '<button class="btn-wa" onclick="buyNow(' + p.id + ')">Buy via WhatsApp</button>';
                
                // Status share button - only visible to admin
                if (isLoggedIn) {
                    html += ' <button class="btn-status" onclick="prepareStatus(' + p.id + ')">📤 Share to Status</button>';
                }
                
                html += '</div>';
            }

            document.getElementById('product-list').innerHTML = html;
        }

        loadProducts();

        // === BUY NOW ===
        function buyNow(productId) {
            var product = findProduct(productId);
            if (!product) return;
            var message = 'Hi Abihani Express! I want to buy: ' + product.name + ' (₦' + (product.price || 'N/A') + ')';
            window.open('https://wa.me/2347067551684?text=' + encodeURIComponent(message), '_blank');
        }

        // === PREPARE STATUS ===
        function prepareStatus(productId) {
            var product = findProduct(productId);
            if (!product) return;

            statusProduct = product;

            // Build status text
            var statusText = '👜 *' + product.name + '*\n';
            statusText += '💰 Price: ₦' + (product.price ? product.price.toLocaleString() : 'N/A') + '\n';
            statusText += '🛒 Order now on Abihani Express!\n';
            statusText += currentDomain;

            document.getElementById('status-text').innerHTML = statusText.replace(/\n/g, '<br>');
            document.getElementById('status-link').textContent = 'Product #' + product.id + ' | Abihani Express';
            document.getElementById('status-preview').style.display = 'block';
            document.getElementById('status-send-btn').style.display = 'inline-block';
            document.getElementById('status-cancel-btn').style.display = 'inline-block';

            // Scroll to preview
            document.getElementById('status-preview').scrollIntoView({ behavior: 'smooth' });
        }

        // === SEND TO STATUS ===
        function sendToStatus() {
            if (!statusProduct) return;

            var message = '👜 *' + statusProduct.name + '*\n';
            message += '💰 Price: ₦' + (statusProduct.price ? statusProduct.price.toLocaleString() : 'N/A') + '\n';
            message += '🛒 Order now on Abihani Express!\n';
            message += currentDomain;

            // WhatsApp Status uses the normal wa.me link with text
            // The user will need to manually forward to "My Status" in WhatsApp
            var url = 'https://wa.me/?text=' + encodeURIComponent(message);
            window.open(url, '_blank');

            cancelStatus();
        }

        // === CANCEL STATUS ===
        function cancelStatus() {
            statusProduct = null;
            document.getElementById('status-preview').style.display = 'none';
            document.getElementById('status-send-btn').style.display = 'none';
            document.getElementById('status-cancel-btn').style.display = 'none';
            document.getElementById('status-text').textContent = '';
        }

        // === FIND PRODUCT ===
        async function findProduct(productId) {
            var result = await supabase.from('products').select('*').eq('id', productId).single();
            return result.data;
        }

        // === CHECK SESSION ===
        async function checkSession() {
            var sessionResult = await supabase.auth.getSession();
            if (sessionResult.data && sessionResult.data.session) {
                isLoggedIn = true;
                currentUser = sessionResult.data.session.user;
                showAdminPanel();
                loadProducts();
            }
        }
        checkSession();

        function showLoginForm() {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('show-login-btn').style.display = 'none';
        }

        async function doLogin() {
            var email = document.getElementById('login-email').value;
            var password = document.getElementById('login-password').value;
            
            var authResult = await supabase.auth.signInWithPassword({ email: email, password: password });

            if (authResult.error) {
                document.getElementById('login-error').textContent = 'Login failed';
                return;
            }

            var adminCheck = await supabase.from('admins').select('*').eq('email', email).single();

            if (adminCheck.error || !adminCheck.data) {
                document.getElementById('login-error').textContent = 'Not an admin';
                await supabase.auth.signOut();
                return;
            }

            isLoggedIn = true;
            currentUser = authResult.data.user;
            showAdminPanel();
            loadProducts();
        }

        function showAdminPanel() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('show-login-btn').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('login-status').textContent = 'Logged in';
            document.getElementById('admin-welcome').textContent = 'Welcome, ' + currentUser.email;
        }

        async function doLogout() {
            await supabase.auth.signOut();
            isLoggedIn = false;
            currentUser = null;
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('show-login-btn').style.display = 'block';
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('login-status').textContent = 'Not logged in';
            cancelStatus();
            loadProducts();
        }
    </script>
</body>
</html>

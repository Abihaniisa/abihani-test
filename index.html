<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PWA Test</title>
    <link rel="manifest" href="/manifest.webmanifest" crossorigin="use-credentials">
    <meta name="theme-color" content="#b87c4f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="PWA Test">
    <link rel="icon" type="image/png" sizes="192x192" href="https://hibpuvurlvkuqjawkqlu.supabase.co/storage/v1/object/public/images/logo.png">
    <link rel="apple-touch-icon" href="https://hibpuvurlvkuqjawkqlu.supabase.co/storage/v1/object/public/images/logo.png">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #install-banner {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #b87c4f;
            color: #fff;
            padding: 16px;
            text-align: center;
            z-index: 9999;
            font-size: 14px;
        }
        #install-banner button {
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-install { background: #fff; color: #b87c4f; border: none; }
        .btn-close { background: transparent; color: #fff; border: 1px solid #fff; margin-left: 8px; }
    </style>
</head>
<body>

    <h2>PWA Install Test</h2>
    <p id="status">Checking...</p>

    <div id="install-banner">
        <strong>PWA Test App</strong><br>
        Add to your home screen for quick access.
        <br>
        <button class="btn-install" onclick="installApp()">Install</button>
        <button class="btn-close" onclick="closeBanner()">Close</button>
    </div>

    <script>
    var deferredPrompt;

    window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('install-banner').style.display = 'block';
        document.getElementById('status').textContent = '✅ Install prompt detected!';
    });

    function installApp() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(function(result) {
                document.getElementById('status').textContent = result.outcome === 'accepted' ? '🎉 App installed!' : '👎 Dismissed.';
                closeBanner();
                deferredPrompt = null;
            });
        }
    }

    function closeBanner() {
        document.getElementById('install-banner').style.display = 'none';
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js').then(function() {
                console.log('SW registered');
            });
        });
    }
    </script>

</body>
</html>

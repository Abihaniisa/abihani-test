<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abihani Express</title>
</head>
<body>
    <div id="product">LOADING...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
    <script>
        document.getElementById('product').textContent = 'Step 1: Script running';

        var supabaseUrl = 'https://eljgjxoptjxwdpuvzkpp.supabase.co';
        var supabaseKey = 'sb_publishable_RYlO1vwmzFViNl_68dDQ3Q_IfsRPIxZ';

        var supabase;
        try {
            supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
            document.getElementById('product').textContent = 'Step 2: Client created';
        } catch(e) {
            document.getElementById('product').textContent = 'Failed at Step 2: ' + e.message;
        }

        async function loadProduct() {
            try {
                document.getElementById('product').textContent = 'Step 3: Fetching...';
                var result = await supabase
                    .from('products')
                    .select('*')
                    .eq('id', 1)
                    .single();

                if (result.error) {
                    document.getElementById('product').textContent = 'Step 3 Error: ' + result.error.message;
                    return;
                }

                var data = result.data;
                document.getElementById('product').innerHTML = 
                    '<h2>' + data.name + '</h2>' +
                    '<img src="' + data.image_url + '" alt="' + data.name + '" style="max-width:400px;border-radius:12px;">';
            } catch(e) {
                document.getElementById('product').textContent = 'Step 3 Crash: ' + e.message;
            }
        }

        loadProduct();
    </script>
</body>
</html>

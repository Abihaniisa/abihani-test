<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abihani Express · Admin Test</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#fdf9f5;color:#2c2418;min-height:100vh}
        .container{max-width:600px;margin:0 auto;padding:16px}
        input,textarea,select{width:100%;padding:12px 16px;border:1px solid #e8dfd6;border-radius:12px;font-size:14px;margin:8px 0;background:#fdf9f5;color:#2c2418;font-family:inherit}
        input:focus,textarea:focus,select:focus{outline:none;border-color:#b87c4f}
        button{padding:12px 20px;border-radius:30px;font-weight:600;cursor:pointer;font-size:14px;border:none;display:inline-flex;align-items:center;gap:6px}
        .btn-primary{background:#b87c4f;color:#fff}.btn-danger{background:#e74c3c;color:#fff}
        .btn-outline{background:transparent;border:1.5px solid #b87c4f;color:#b87c4f}
        .btn-sm{padding:6px 14px;font-size:12px}.btn-green{background:#27ae60;color:#fff}.btn-blue{background:#2980b9;color:#fff}
        .card{background:#fff;border-radius:16px;padding:20px;margin-bottom:12px;border:1px solid #e8dfd6}
        .card h3{color:#b87c4f;margin-bottom:8px;font-size:18px}.card h4{color:#b87c4f;margin-bottom:4px}
        .flex{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
        .flex-between{display:flex;justify-content:space-between;align-items:center}
        .item-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0ebe4;cursor:pointer;font-size:14px}
        .item-row:hover{background:#fdf9f5}.item-row:last-child{border-bottom:none}
        .badge{background:#e74c3c;color:#fff;border-radius:50%;padding:2px 8px;font-size:11px;min-width:20px;text-align:center}
        .tabs{display:flex;gap:8px;margin-bottom:16px;border-bottom:2px solid #e8dfd6}
        .tab{padding:8px 16px;border:none;background:transparent;color:#a6947e;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
        .tab.active{color:#b87c4f;border-bottom-color:#b87c4f}
        .status{font-size:12px;margin-top:8px;min-height:18px}.status.success{color:#27ae60}.status.error{color:#e74c3c}.status.info{color:#2980b9}
        .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:1000;justify-content:center;align-items:center;padding:20px}
        .modal-overlay.show{display:flex}
        .modal{background:#fff;border-radius:16px;padding:20px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto}
        .modal h3{color:#b87c4f;margin-bottom:12px}
        .close-btn{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:#a6947e}
        .image-preview{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #e8dfd6;margin:4px}
        .dropdown-list{max-height:180px;overflow-y:auto;border:1px solid #e8dfd6;border-radius:8px;margin-top:4px;display:none}
        .dropdown-list.show{display:block}
        .dropdown-item{padding:10px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid #f0ebe4}
        .dropdown-item:hover{background:#fdf9f5}
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;color:#fff;font-weight:600;z-index:2000;font-size:14px}
        .toast.success{background:#27ae60}.toast.error{background:#e74c3c}.toast.info{background:#b87c4f}
        label{font-size:12px;font-weight:600;color:#6b5a4a;display:block;margin-top:8px}
    </style>
</head>
<body>
<div class="container" id="app"></div>
<div class="modal-overlay" id="modal-overlay"><div class="modal" id="modal-content"></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
<script>
var SUPABASE_URL = 'https://hibpuvurlvkuqjawkqlu.supabase.co';
var SUPABASE_KEY = 'sb_publishable_Mb6I2-X_6J2Hl-MbcAQRzA_mgWsduoA';
var RESEND_KEY = 're_gwvYG6oG_7GbFqxZTBcSQ8gdjYUCFHjQi';
var CEO_EMAIL = 'bayeroisa2003@gmail.com';
var CEO_EMAILS = ['bayeroisa2003@gmail.com','abihaniisa@gmail.com','mrsabihani@gmail.com'];
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var currentUser = null;
var viewingAdmin = null;
var inactivityTimer = null;
var allPartners = [];
var allCategories = [];
var allSubcategories = [];
var allProducts = [];

function render(html) { document.getElementById('app').innerHTML = html; }

function showToast(msg, type) {
    var t = document.createElement('div');
    t.className = 'toast ' + (type || 'info');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function() { t.remove(); }, 4000);
}

function openModal(html) {
    document.getElementById('modal-content').innerHTML = '<span class="close-btn" onclick="closeModal()">&times;</span>' + html;
    document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }

function resetInactivityTimer() {
    clearTimeout(inactivityTimer);
    if (!currentUser) return;
    inactivityTimer = setTimeout(function() {
        currentUser = null; viewingAdmin = null;
        localStorage.removeItem('abihani_test_session');
        renderLogin(); showToast('Logged out due to inactivity', 'info');
    }, 300000);
}
document.addEventListener('click', resetInactivityTimer);
document.addEventListener('keydown', resetInactivityTimer);

function saveSession() {
    localStorage.setItem('abihani_test_session', JSON.stringify({
        email: currentUser ? currentUser.email : null,
        role: currentUser ? currentUser.role : null,
        isCEO: currentUser ? currentUser.isCEO : false
    }));
}
function loadSession() {
    var s = localStorage.getItem('abihani_test_session');
    if (s) {
        var data = JSON.parse(s);
        if (data.email) { currentUser = { email: data.email, role: data.role, isCEO: data.isCEO }; resetInactivityTimer(); return true; }
    }
    return false;
}

async function sendEmail(to, subject, html) {
    try {
        var r = await fetch('/api/send-email', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ to: to, subject: subject, html: html }) });
        return r.ok;
    } catch(e) { return false; }
}

async function loadAllData() {
    var ownerEmail = viewingAdmin || (currentUser ? currentUser.email : '');
    var c = await supabase.from('categories').select('*').order('sort_order');
    allCategories = (c.data || []).filter(function(x) { return currentUser && currentUser.isCEO && !viewingAdmin ? true : x.owner_email === ownerEmail; });
    var s = await supabase.from('subcategories').select('*');
    allSubcategories = (s.data || []).filter(function(x) { return currentUser && currentUser.isCEO && !viewingAdmin ? true : x.owner_email === ownerEmail; });
    var p = await supabase.from('products').select('*').order('created_at', { ascending: false });
    allProducts = (p.data || []).filter(function(x) { return currentUser && currentUser.isCEO && !viewingAdmin ? true : x.owner_email === ownerEmail; });
    var a = await supabase.from('admins').select('*').neq('role','Owner').order('created_at', { ascending: false });
    allPartners = a.data || [];
}

function logout() {
    currentUser = null; viewingAdmin = null;
    localStorage.removeItem('abihani_test_session');
    clearTimeout(inactivityTimer); renderLogin();
}

(function init() {
    if (loadSession()) { renderDashboard(); loadAllData().then(function() { renderDashboard(); }); }
    else { renderLogin(); }
})();
// ============ LOGIN ============
function renderLogin() {
    var html = '<div class="card" style="margin-top:40px"><h3 style="text-align:center">🔐 Abihani Express Admin</h3>';
    html += '<input type="email" id="login-email" placeholder="Email" autocomplete="email"><br>';
    html += '<input type="password" id="login-password" placeholder="Password" autocomplete="current-password"><br>';
    html += '<button class="btn-primary" style="width:100%" onclick="doLogin()">Log In</button>';
    html += '<div id="login-status" class="status"></div>';
    html += '<div style="text-align:center;margin-top:12px;font-size:13px">';
    html += '<a href="#" onclick="renderCreateAccount()" style="color:#b87c4f">Create an account</a> &nbsp;|&nbsp; ';
    html += '<a href="#" onclick="renderApplyForm()" style="color:#b87c4f">Apply for Administratorship</a>';
    html += '</div></div>';
    render(html);
}

async function doLogin() {
    var email = document.getElementById('login-email').value.trim();
    var password = document.getElementById('login-password').value;
    var statusEl = document.getElementById('login-status');
    if (!email || !password) { statusEl.textContent = 'Enter email and password'; statusEl.className = 'status error'; return; }
    statusEl.textContent = 'Logging in...'; statusEl.className = 'status info';
    var isCEO = CEO_EMAILS.indexOf(email) !== -1;
    if (isCEO) {
        var auth = await supabase.auth.signInWithPassword({ email: email, password: password });
        if (auth.error) { statusEl.textContent = 'Wrong password'; statusEl.className = 'status error'; return; }
        currentUser = { email: email, role: 'Owner', isCEO: true };
        saveSession(); resetInactivityTimer(); await loadAllData(); renderDashboard(); return;
    }
    var admins = await supabase.from('admins').select('*').eq('email', email);
    if (!admins.data || admins.data.length === 0) { statusEl.textContent = 'No account found. Apply for administratorship.'; statusEl.className = 'status error'; return; }
    var admin = admins.data[0];
    if (admin.status === 'frozen') { statusEl.textContent = 'Your account has been paused. Contact Abihani Express to resolve it.'; statusEl.className = 'status error'; return; }
    if (admin.status === 'pending_password') { statusEl.textContent = 'Approved! Create your account below.'; statusEl.className = 'status info'; return; }
    if (admin.expiry_date && new Date(admin.expiry_date) < new Date()) { statusEl.textContent = 'Administratorship expired. Contact CEO to renew.'; statusEl.className = 'status error'; return; }
    if (admin.password_hash !== password) { statusEl.textContent = 'Wrong password'; statusEl.className = 'status error'; return; }
    currentUser = { email: email, role: 'admin', isCEO: false };
    saveSession(); resetInactivityTimer(); await loadAllData(); renderDashboard();
}

// ============ CREATE ACCOUNT ============
function renderCreateAccount() {
    var html = '<div class="card" style="margin-top:40px"><h3 style="text-align:center">Join the Family</h3>';
    html += '<p style="font-size:12px;color:#a6947e;text-align:center">Use your approved email to set a password.</p>';
    html += '<input type="email" id="create-email" placeholder="Email (must be approved)" autocomplete="email"><br>';
    html += '<input type="password" id="create-password" placeholder="Create Password" autocomplete="new-password"><br>';
    html += '<input type="password" id="create-confirm" placeholder="Confirm Password" autocomplete="new-password"><br>';
    html += '<button class="btn-primary" style="width:100%" onclick="doCreateAccount()">Create Account</button>';
    html += '<div id="create-status" class="status"></div>';
    html += '<button class="btn-outline btn-sm" style="width:100%;margin-top:8px" onclick="renderLogin()">← Back to Login</button></div>';
    render(html);
}

async function doCreateAccount() {
    var email = document.getElementById('create-email').value.trim();
    var password = document.getElementById('create-password').value;
    var confirm = document.getElementById('create-confirm').value;
    var statusEl = document.getElementById('create-status');
    if (!email || !password || !confirm) { statusEl.textContent = 'All fields required'; statusEl.className = 'status error'; return; }
    if (password !== confirm) { statusEl.textContent = 'Passwords do not match'; statusEl.className = 'status error'; return; }
    var admin = await supabase.from('admins').select('*').eq('email', email).single();
    if (!admin.data) { statusEl.textContent = 'This email is not approved yet'; statusEl.className = 'status error'; return; }
    if (admin.data.password_hash) { statusEl.textContent = 'Account already exists. Please log in.'; statusEl.className = 'status error'; return; }
    await supabase.from('admins').update({ password_hash: password, status: 'active' }).eq('email', email);
    statusEl.textContent = 'Account created! You can now log in.'; statusEl.className = 'status success';
    setTimeout(function() { renderLogin(); }, 1500);
}

// ============ APPLY FOR ADMINISTRATORSHIP ============
function renderApplyForm() {
    var html = '<div class="card" style="margin-top:40px"><h3 style="text-align:center">📝 Apply for Administratorship</h3>';
    html += '<p style="font-size:12px;color:#a6947e;text-align:center">Fill this form to request your own store on Abihani Express.</p>';
    html += '<input id="app-name" placeholder="Full Name *">';
    html += '<input id="app-business" placeholder="Business Name *">';
    html += '<input id="app-email" type="email" placeholder="Email (will be your login) *">';
    html += '<input id="app-whatsapp" placeholder="WhatsApp Number *">';
    html += '<button class="btn-primary" style="width:100%" onclick="submitApplication()">📤 Send Request</button>';
    html += '<div id="apply-status" class="status"></div>';
    html += '<button class="btn-outline btn-sm" style="width:100%;margin-top:8px" onclick="renderLogin()">← Back to Login</button></div>';
    render(html);
}

async function submitApplication() {
    var name = document.getElementById('app-name').value.trim();
    var business = document.getElementById('app-business').value.trim();
    var email = document.getElementById('app-email').value.trim();
    var whatsapp = document.getElementById('app-whatsapp').value.trim();
    var statusEl = document.getElementById('apply-status');
    if (!name || !business || !email || !whatsapp) { statusEl.textContent = 'All fields are required'; statusEl.className = 'status error'; return; }
    var existing = await supabase.from('admin_applications').select('id').eq('email', email);
    if (existing.data && existing.data.length > 0) { statusEl.textContent = 'You already applied. Please wait for review.'; statusEl.className = 'status info'; return; }
    await supabase.from('admin_applications').insert({ name: name, business_name: business, email: email, whatsapp: whatsapp, status: 'pending' });
    sendEmail(CEO_EMAIL, '📋 New Administratorship Request from ' + name, '<p><strong>Name:</strong> ' + name + '</p><p><strong>Business:</strong> ' + business + '</p><p><strong>Email:</strong> ' + email + '</p><p><strong>WhatsApp:</strong> ' + whatsapp + '</p><p>Review in your admin dashboard.</p>');
    statusEl.textContent = 'Request sent! Check your email for updates.'; statusEl.className = 'status success';
    setTimeout(function() { renderLogin(); }, 2500);
}

// ============ DASHBOARD ============
function renderDashboard() {
    if (!currentUser) { renderLogin(); return; }
    var isCEO = currentUser.isCEO;
    var html = '';
    html += '<div class="flex-between" style="margin-bottom:16px">';
    html += '<h3>' + (viewingAdmin ? '👤 ' + viewingAdmin : '👑 Dashboard') + '</h3>';
    html += '<div class="flex">';
    if (viewingAdmin) { html += '<button class="btn-outline btn-sm" onclick="viewingAdmin=null;loadAllData().then(function(){renderDashboard();})">← Back to Partners</button>'; }
    html += '<button class="btn-danger btn-sm" onclick="logout()">Logout</button></div></div>';
    html += '<div class="card"><h4>Welcome, ' + (currentUser.email.split('@')[0]) + '</h4>';
    html += '<span style="display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;' + (isCEO ? 'background:#b87c4f;color:#fff' : 'background:#f5efe8;color:#b87c4f;border:1px solid #b87c4f') + '">' + (isCEO ? 'CEO · FULL ACCESS' : 'ADMINISTRATOR') + '</span></div>';

    if (isCEO && !viewingAdmin) {
        html += '<div class="card" style="cursor:pointer" onclick="renderAdminRequests()"><h4>📋 Administratorship Requests <span id="pending-badge" class="badge" style="float:right"></span></h4></div>';
        html += '<div class="card" style="cursor:pointer" onclick="renderPartners()"><h4>👥 Abihani Express Partners</h4></div>';
    }
    html += '<div class="card" style="cursor:pointer" onclick="renderSettings()"><h4>⚙️ Settings</h4><p style="font-size:11px;color:#a6947e">Manage your details</p></div>';
    html += '<div class="flex" style="margin-bottom:12px"><button class="btn-primary" onclick="renderAddProduct()">➕ Add Product</button><button class="btn-outline" onclick="renderAddCategory()">➕ Add Category</button></div>';
    html += '<div class="card" style="cursor:pointer" onclick="renderAllProducts()"><h4>📦 All Products (' + allProducts.length + ')</h4><p style="font-size:11px;color:#a6947e">Tap to view, edit or delete</p></div>';
    html += '<div class="card" style="cursor:pointer" onclick="renderCategoriesList()"><h4>📁 Categories (' + allCategories.length + ')</h4><p style="font-size:11px;color:#a6947e">Tap to browse categories</p></div>';
    html += '<div class="card" style="cursor:pointer" onclick="renderEmailCenter()"><h4>✉️ Email Center</h4><p style="font-size:11px;color:#a6947e">' + (isCEO ? 'Send professional emails' : 'Send message to CEO or partners') + '</p></div>';
    render(html);
    if (isCEO && !viewingAdmin) {
        supabase.from('admin_applications').select('*', { count: 'exact', head: true }).eq('status', 'pending').then(function(r) {
            var badge = document.getElementById('pending-badge');
            if (badge && r.count > 0) badge.textContent = r.count; else if (badge) badge.style.display = 'none';
        });
    }
}

// ============ CATEGORIES LIST (NEW - separate page) ============
function renderCategoriesList() {
    var html = '<div class="flex-between" style="margin-bottom:16px"><button class="btn-outline btn-sm" onclick="renderDashboard()">← Back</button><h3>📁 Categories (' + allCategories.length + ')</h3><span></span></div>';
    if (allCategories.length === 0) {
        html += '<p style="text-align:center;color:#a6947e;padding:30px">No categories yet</p>';
    } else {
        for (var i = 0; i < allCategories.length; i++) {
            var cat = allCategories[i];
            var subs = allSubcategories.filter(function(s) { return s.category_id == cat.id; });
            html += '<div class="item-row" onclick="renderSubcategories(\'' + cat.id + '\')">';
            html += '<span><strong>' + (cat.emoji || '📁') + ' ' + cat.name + '</strong> <small style="color:#a6947e">(' + subs.length + ' subs)</small></span>';
            html += '<span onclick="event.stopPropagation()">';
            html += '<button class="btn-outline btn-sm" onclick="editCategory(\'' + cat.id + '\')">✏️</button> ';
            html += '<button class="btn-danger btn-sm" onclick="deleteCategory(\'' + cat.id + '\')">🗑️</button>';
            if (currentUser.isCEO) {
                html += ' <button class="btn-outline btn-sm" onclick="moveCatUp(' + i + ')">⬆️</button>';
                html += ' <button class="btn-outline btn-sm" onclick="moveCatDown(' + i + ')">⬇️</button>';
            }
            html += '</span></div>';
        }
    }
    render(html);
}
// ============ ADMIN REQUESTS ============
function renderAdminRequests() {
    var html = '<div class="flex-between" style="margin-bottom:16px"><button class="btn-outline btn-sm" onclick="renderDashboard()">← Back</button><h3>📋 Requests</h3><span></span></div>';
    html += '<div class="tabs"><button class="tab active" onclick="loadRequestTab(\'pending\',this)">Pending</button><button class="tab" onclick="loadRequestTab(\'approved\',this)">Approved</button><button class="tab" onclick="loadRequestTab(\'rejected\',this)">Rejected</button></div>';
    html += '<div id="request-content"><p style="text-align:center;color:#a6947e">Loading...</p></div>';
    render(html);
    loadRequestTab('pending', document.querySelector('.tab'));
}

async function loadRequestTab(status, btn) {
    var tabs = document.querySelectorAll('.tab');
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
    if (btn) btn.classList.add('active');
    var container = document.getElementById('request-content');
    container.innerHTML = '<p style="text-align:center;color:#a6947e">Loading...</p>';
    var apps = await supabase.from('admin_applications').select('*').eq('status', status).order('created_at', { ascending: false });
    var data = apps.data || [];
    if (data.length === 0) { container.innerHTML = '<p style="text-align:center;color:#a6947e;padding:30px">Nothing here</p>'; return; }
    var html = '';
    for (var i = 0; i < data.length; i++) {
        var a = data[i];
        html += '<div class="card"><div class="flex-between"><div><strong>' + a.name + '</strong><br><small>' + a.email + '</small><br><small>' + a.business_name + ' | ' + a.whatsapp + '</small><br><small style="color:#a6947e">' + new Date(a.created_at).toLocaleDateString() + '</small></div>';
        if (status === 'pending') { html += '<div class="flex"><button class="btn-green btn-sm" onclick="approveApp(\'' + a.id + '\')">✅ Approve</button><button class="btn-danger btn-sm" onclick="rejectApp(\'' + a.id + '\')">❌ Reject</button></div>'; }
        if (status === 'rejected') { html += '<div><small style="color:#e74c3c">' + (a.reject_reason || 'No reason') + '</small></div>'; }
        if (status === 'approved') { html += '<div><small style="color:#27ae60">Approved: ' + new Date(a.approved_at).toLocaleDateString() + '</small></div>'; }
        html += '</div></div>';
    }
    container.innerHTML = html;
}

async function approveApp(id) {
    var app = await supabase.from('admin_applications').select('*').eq('id', id).single();
    if (!app.data) return;
    var d = app.data;
    var expiry = new Date(); expiry.setMonth(expiry.getMonth() + 12);
    await supabase.from('admin_applications').update({ status: 'approved', approved_at: new Date().toISOString(), expiry_date: expiry.toISOString() }).eq('id', id);
    await supabase.from('admins').insert({ email: d.email, password_hash: '', name: d.name, business_name: d.business_name, whatsapp: d.whatsapp, role: 'admin', status: 'pending_password', expiry_date: expiry.toISOString() });
    sendEmail(d.email, 'Welcome to Abihani Express! 🎉', '<p>Dear ' + d.name + ',</p><p>Your application for <strong>' + d.business_name + '</strong> has been approved!</p><p>Go to Admin Login and click <strong>Create an account</strong> using your email.</p><p>Valid until: ' + expiry.toLocaleDateString() + '</p>');
    sendEmail(CEO_EMAIL, 'New Admin Approved: ' + d.name, '<p>' + d.name + ' (' + d.business_name + ') has been approved as an administrator.</p>');
    showToast('Approved! Email sent to ' + d.name, 'success');
    loadRequestTab('pending', document.querySelector('.tab'));
    loadAllData();
}

async function rejectApp(id) {
    var reason = prompt('Reason for rejection:', 'Due to unconfirmed payment');
    if (!reason) return;
    var app = await supabase.from('admin_applications').select('*').eq('id', id).single();
    if (!app.data) return;
    await supabase.from('admin_applications').update({ status: 'rejected', reject_reason: reason, rejected_at: new Date().toISOString() }).eq('id', id);
    sendEmail(app.data.email, 'Update on Your Application', '<p>Dear ' + app.data.name + ',</p><p>Your application was not approved this time.</p><p><strong>Reason:</strong> ' + reason + '</p>');
    showToast('Rejected. Email sent.', 'info');
    loadRequestTab('pending', document.querySelector('.tab'));
}

// ============ EXPRESS PARTNERS ============
function renderPartners() {
    var html = '<div class="flex-between" style="margin-bottom:16px"><button class="btn-outline btn-sm" onclick="renderDashboard()">← Back</button><h3>👥 Partners</h3><span></span></div>';
    if (allPartners.length === 0) { html += '<p style="text-align:center;color:#a6947e;padding:30px">No partners yet</p>'; }
    else {
        for (var i = 0; i < allPartners.length; i++) {
            var p = allPartners[i];
            var isExpired = p.expiry_date && new Date(p.expiry_date) < new Date();
            var isFrozen = p.status === 'frozen';
            var statusText = isFrozen ? 'FROZEN' : (isExpired ? 'EXPIRED' : 'Active');
            var statusColor = isFrozen ? '#2980b9' : (isExpired ? '#e74c3c' : '#27ae60');
            var statusBg = isFrozen ? '#e8f0fe' : (isExpired ? '#fde8e8' : '#e8f8e8');
            html += '<div class="card"><div class="flex-between" onclick="viewPartner(\'' + p.email + '\')" style="cursor:pointer"><div><strong>' + (p.business_name || p.email) + '</strong><br><small>' + p.email + ' | ' + (p.whatsapp || 'N/A') + '</small><br><small style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;background:' + statusBg + ';color:' + statusColor + '">' + statusText + '</small></div><span style="font-size:20px;color:#b87c4f">›</span></div>';
            html += '<div class="flex" style="margin-top:8px" onclick="event.stopPropagation()">';
            if (!isFrozen) { html += '<button class="btn-blue btn-sm" onclick="freezePartner(\'' + p.email + '\')">❄️ Freeze</button>'; }
            else { html += '<button class="btn-green btn-sm" onclick="unfreezePartner(\'' + p.email + '\')">🌤️ Unfreeze</button>'; }
            html += '<button class="btn-danger btn-sm" onclick="deletePartner(\'' + p.email + '\',\'' + (p.business_name || p.email).replace(/'/g,"\\'") + '\')">🗑️ Delete Store</button>';
            html += '</div></div>';
        }
    }
    render(html);
}

async function saveEditProduct(id) {
    var name = document.getElementById('ep-name').value.trim();

    var keptUrls = []; var removedIndices = JSON.parse(document.getElementById('side-removed').value || '[]');

function renderAddSubcategory(catId) { var html = '<h3>➕ Add Subcategory</h3><label>Subcategory Name</label><input id="as-name" placeholder="Subcategory Name"><button class="btn-primary" style="width:100%" onclick="saveNewSubcategory(\'' + catId + '\')">Save</button>'; openModal(html); }
async function saveNewSubcategory(catId) { var name = document.getElementById('as-name').value.trim(); if (!name) { showToast('Name required', 'error'); return; } await supabase.from('subcategories').insert({ name: name, category_id: parseInt(catId), owner_email: viewingAdmin || currentUser.email }); closeModal(); showToast('Subcategory added!', 'success'); loadAllData().then(function() { renderSubcategories(catId); }); }
function editSubcategory(id) { var sub = allSubcategories.find(function(s) { return s.id == id; }); if (!sub) return; var html = '<h3>✏️ Edit Subcategory</h3><label>Subcategory Name</label><input id="es-name" value="' + sub.name + '"><button class="btn-primary" style="width:100%" onclick="saveEditSubcategory(\'' + id + '\')">Update</button>'; openModal(html); }
async function saveEditSubcategory(id) { var name = document.getElementById('es-name').value.trim(); if (!name) { showToast('Name required', 'error'); return; } var sub = allSubcategories.find(function(s) { return s.id == id; }); await supabase.from('subcategories').update({ name: name }).eq('id', id); closeModal(); showToast('Updated!', 'success'); loadAllData().then(function() { renderSubcategories(sub.category_id); }); }
async function deleteSubcategory(id) { if (!confirm('Delete this subcategory and all its products?')) return; var sub = allSubcategories.find(function(s) { return s.id == id; }); await supabase.from('subcategories').delete().eq('id', id); showToast('Subcategory deleted', 'success'); loadAllData().then(function() { renderSubcategories(sub.category_id); }); }

// ============ PRODUCTS UNDER SUBCATEGORY ============
function renderSubProducts(subId) {
    var sub = allSubcategories.find(function(s) { return s.id == subId; }); if (!sub) return;
    var prods = allProducts.filter(function(p) { return p.subcategory_id == subId; });
    var html = '<div class="flex-between" style="margin-bottom:16px"><button class="btn-outline btn-sm" onclick="renderSubcategories(\'' + sub.category_id + '\')">← Back</button><h3>📂 ' + sub.name + '</h3><span></span></div>';
    if (prods.length === 0) { html += '<p style="text-align:center;color:#a6947e;padding:20px">No products here</p>'; }
    else { for (var i = 0; i < prods.length; i++) { var p = prods[i]; html += '<div class="item-row" onclick="renderEditProduct(\'' + p.id + '\')"><span>' + (p.image_url ? '<img src="' + p.image_url + '" style="width:36px;height:36px;object-fit:cover;border-radius:4px;margin-right:8px;vertical-align:middle">' : '<span style="font-size:22px;margin-right:8px;vertical-align:middle">' + (p.image_icon || '📦') + '</span>') + '<strong>' + p.name + '</strong><br><small style="color:#b87c4f">₦' + (p.price || 0).toLocaleString() + '</small></span><span style="font-size:20px;color:#b87c4f">›</span></div>'; } }
    render(html);
}

// ============ EMAIL CENTER ============
function renderEmailCenter() {
    var isCEO = currentUser.isCEO;
    var html = '<h3>✉️ Email Center</h3>';
    if (isCEO) {
        html += '<div class="tabs"><button class="tab active" onclick="switchEmailTab(\'partner\',this)">Registered Partner</button><button class="tab" onclick="switchEmailTab(\'custom\',this)">Custom Email</button></div>';
        html += '<div id="email-partner-section"><label>Search Partner</label><input id="partner-search-input" placeholder="Type business name..." oninput="filterPartnerDropdown()" autocomplete="off"><div class="dropdown-list" id="partner-dropdown"></div></div>';
        html += '<div id="email-custom-section" style="display:none"><label>Recipient Email</label><input id="custom-recipient" type="email" placeholder="customer@example.com"></div>';
    } else {
        html += '<div class="tabs"><button class="tab active" onclick="switchEmailTab(\'partner\',this)">Registered Partner</button><button class="tab" onclick="switchEmailTab(\'ceo\',this)">Send to CEO</button></div>';
        html += '<div id="email-partner-section"><label>Select Partner</label><div class="dropdown-list show" id="partner-dropdown"></div></div>';
        html += '<div id="email-custom-section" style="display:none"><p style="font-size:12px;color:#a6947e">Message will be sent to the CEO</p></div>';
    }
    html += '<label>Subject</label><input id="email-subject" placeholder="Subject">';
    html += '<label>Message</label><textarea id="email-message" placeholder="Message" rows="3"></textarea>';
    html += '<button class="btn-primary" style="width:100%" onclick="sendCustomEmail()">📤 Send Email</button>';
    html += '<div id="email-status" class="status"></div>';
    openModal(html);
    window._emailType = 'partner'; window._selectedPartner = null; loadPartnerDropdown();
}

function loadPartnerDropdown() {
    var dd = document.getElementById('partner-dropdown'); if (!dd) return;
    dd.innerHTML = '';
    if (!currentUser.isCEO) { dd.innerHTML += '<div class="dropdown-item" onclick="selectPartner(\'bayeroisa2003@gmail.com\',\'Abihani Isa (CEO)\')">Abihani Isa (CEO) <small style="color:#a6947e">bayeroisa2003@gmail.com</small></div>'; }
    for (var i = 0; i < allPartners.length; i++) { var p = allPartners[i]; dd.innerHTML += '<div class="dropdown-item" onclick="selectPartner(\'' + p.email + '\',\'' + (p.business_name || p.email).replace(/'/g,"\\'") + '\')">' + (p.business_name || p.email) + ' <small style="color:#a6947e">' + p.email + '</small></div>'; }
    dd.classList.add('show');
}

function filterPartnerDropdown() {
    var q = document.getElementById('partner-search-input').value.toLowerCase();
    var dd = document.getElementById('partner-dropdown');
    var items = dd.querySelectorAll('.dropdown-item');
    for (var i = 0; i < items.length; i++) { items[i].style.display = items[i].textContent.toLowerCase().indexOf(q) !== -1 ? 'block' : 'none'; }
    dd.classList.add('show');
}

function selectPartner(email, name) {
    window._selectedPartner = email;
    var si = document.getElementById('partner-search-input'); if (si) si.value = name + ' (' + email + ')';
    document.getElementById('partner-dropdown').classList.remove('show');
}

function switchEmailTab(type, btn) {
    window._emailType = type;
    var tabs = document.querySelectorAll('.tab'); for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
    btn.classList.add('active');
    var ps = document.getElementById('email-partner-section'); var cs = document.getElementById('email-custom-section');
    if (type === 'partner') { ps.style.display = 'block'; cs.style.display = 'none'; } else { ps.style.display = 'none'; cs.style.display = 'block'; }
}

async function sendCustomEmail() {
    var recipient;
    if (window._emailType === 'partner') { recipient = window._selectedPartner; }
    else if (window._emailType === 'ceo') { recipient = CEO_EMAIL; }
    else { recipient = document.getElementById('custom-recipient').value.trim(); }
    var subject = document.getElementById('email-subject').value.trim();
    var message = document.getElementById('email-message').value.trim();
    var statusEl = document.getElementById('email-status');
    if (!recipient) { statusEl.textContent = 'Select or enter a recipient'; statusEl.className = 'status error'; return; }
    if (!subject) { statusEl.textContent = 'Subject required'; statusEl.className = 'status error'; return; }
    if (!message) { statusEl.textContent = 'Message required'; statusEl.className = 'status error'; return; }
    statusEl.textContent = 'Sending...'; statusEl.className = 'status info';
    var footer = currentUser.isCEO ? '<br><br><hr><p style="font-size:11px;color:#a6947e">Abihani Isa<br>Founder & CEO, Abihani Nig Ltd<br>www.abihaniexpress.com.ng</p>' : '';
    var ok = await sendEmail(recipient, subject, '<p>' + message.replace(/\n/g, '<br>') + '</p>' + footer);
    if (ok) { statusEl.textContent = 'Email sent! ✉️'; statusEl.className = 'status success'; document.getElementById('email-subject').value = ''; document.getElementById('email-message').value = ''; }
    else { statusEl.textContent = 'Failed to send. Check console.'; statusEl.className = 'status error'; }
}
</script>

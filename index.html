<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abihani Express - Admin Test</title>
</head>
<body>
    <div id="debug">Step 0: Page loaded</div>
    
    <!-- Product Display -->
    <h3>All Products</h3>
    <div id="product-list">LOADING PRODUCTS...</div>
    
    <hr>
    
    <!-- Login / Admin Section -->
    <div id="admin-section">
        <p id="login-status">Not logged in</p>
        <button id="show-login-btn" onclick="showLoginForm()">Admin Login</button>
        
        <div id="login-form" style="display:none; margin:10px 0;">
            <input type="email" id="login-email" placeholder="Email" value="bayeroisa2003@gmail.com"><br>
            <input type="password" id="login-password" placeholder="Password"><br>
            <button onclick="doLogin()">Log In</button>
            <p id="login-error" style="color:red;"></p>
        </div>
        
        <div id="admin-panel" style="display:none; margin:10px 0;">
            <p id="admin-welcome"></p>
            <button onclick="doLogout()">Logout</button>
            <hr>
            <h4>Add New Product</h4>
            <input type="text" id="product-name" placeholder="Product name"><br>
            <input type="number" id="product-price" placeholder="Price (₦)"><br>
            <input type="file" id="image-picker" accept="image/*"><br>
            <button onclick="uploadNewProduct()">+ Add Product</button>
            <p id="upload-status"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
    <script>
        // === CONFIG ===
        var supabaseUrl = 'https://eljgjxoptjxwdpuvzkpp.supabase.co';
        var supabaseKey = 'sb_publishable_RYlO1vwmzFViNl_68dDQ3Q_IfsRPIxZ';
        var supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        var isLoggedIn = false;
        var currentUser = null;

        document.getElementById('debug').textContent = 'Step 1: Supabase ready';

        // === LOAD ALL PRODUCTS ===
        async function loadProducts() {
            try {
                var result = await supabase
                    .from('products')
                    .select('*')
                    .order('id', { ascending: false });

                if (result.error) {
                    document.getElementById('product-list').textContent = 'Error: ' + result.error.message;
                    return;
                }

                var products = result.data;
                
                if (!products || products.length === 0) {
                    document.getElementById('product-list').textContent = 'No products yet.';
                    return;
                }

                var html = '';
                for (var i = 0; i < products.length; i++) {
                    var p = products[i];
                    var imageHtml = p.image_url 
                        ? '<img src="' + p.image_url + '" alt="' + p.name + '" style="max-width:200px;border-radius:12px;">'
                        : '<p>No image</p>';
                    
                    html += '<div style="border:1px solid #ccc; padding:10px; margin:10px 0; border-radius:8px;">' +
                        '<strong>#' + p.id + ' - ' + p.name + '</strong>' +
                        '<p>Price: ₦' + (p.price || 'N/A') + '</p>' +
                        imageHtml;
                    
                    // Add delete button if logged in
                    if (isLoggedIn) {
                        html += '<br><button onclick="deleteProduct(' + p.id + ')" style="background:red;color:white;border:none;padding:5px 10px;border-radius:4px;margin-top:5px;">Delete</button>';
                    }
                    
                    html += '</div>';
                }

                document.getElementById('product-list').innerHTML = html;
            } catch(e) {
                document.getElementById('product-list').textContent = 'Error: ' + e.message;
            }
        }

        loadProducts();

        // === DELETE PRODUCT (works on ANY product, including #1) ===
        async function deleteProduct(productId) {
            if (!confirm('Delete product #' + productId + '?')) return;
            
            var result = await supabase
                .from('products')
                .delete()
                .eq('id', productId);
            
            if (result.error) {
                alert('Delete error: ' + result.error.message);
                return;
            }
            
            // Reload the list
            loadProducts();
        }

        // === CHECK SESSION ===
        async function checkSession() {
            var sessionResult = await supabase.auth.getSession();
            if (sessionResult.data && sessionResult.data.session) {
                isLoggedIn = true;
                currentUser = sessionResult.data.session.user;
                showAdminPanel();
                loadProducts(); // Reload to show delete buttons
            }
        }
        checkSession();

        // === LOGIN ===
        function showLoginForm() {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('show-login-btn').style.display = 'none';
        }

        async function doLogin() {
            var email = document.getElementById('login-email').value;
            var password = document.getElementById('login-password').value;
            
            var authResult = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (authResult.error) {
                document.getElementById('login-error').textContent = 'Login failed: ' + authResult.error.message;
                return;
            }

            var adminCheck = await supabase
                .from('admins')
                .select('*')
                .eq('email', email)
                .single();

            if (adminCheck.error || !adminCheck.data) {
                document.getElementById('login-error').textContent = 'Not an admin account';
                await supabase.auth.signOut();
                return;
            }

            isLoggedIn = true;
            currentUser = authResult.data.user;
            showAdminPanel();
            loadProducts(); // Reload to show delete buttons
        }

        function showAdminPanel() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('show-login-btn').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('login-status').textContent = 'Logged in';
            document.getElementById('admin-welcome').textContent = 'Welcome, ' + (currentUser ? currentUser.email : 'Admin');
        }

        async function doLogout() {
            await supabase.auth.signOut();
            isLoggedIn = false;
            currentUser = null;
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('show-login-btn').style.display = 'block';
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('login-status').textContent = 'Not logged in';
            document.getElementById('login-password').value = '';
            loadProducts(); // Reload to hide delete buttons
        }

        // === UPLOAD NEW PRODUCT ===
        async function uploadNewProduct() {
            var name = document.getElementById('product-name').value.trim();
            var price = document.getElementById('product-price').value;
            var fileInput = document.getElementById('image-picker');
            var file = fileInput.files[0];
            
            if (!name) {
                document.getElementById('upload-status').textContent = 'Please enter a product name';
                return;
            }
            if (!file) {
                document.getElementById('upload-status').textContent = 'Please select an image';
                return;
            }

            document.getElementById('upload-status').textContent = 'Uploading...';

            try {
                // Upload image
                var fileExt = file.name.split('.').pop();
                var fileName = 'products/' + Date.now() + '_' + Math.random().toString(36).substring(2, 8) + '.' + fileExt;
                var uploadResult = await supabase.storage.from('images').upload(fileName, file);
                
                if (uploadResult.error) {
                    document.getElementById('upload-status').textContent = 'Upload error: ' + uploadResult.error.message;
                    return;
                }

                // Get URL
                var urlResult = supabase.storage.from('images').getPublicUrl(fileName);
                var publicUrl = urlResult.data.publicUrl;

                // INSERT new row
                var insertResult = await supabase
                    .from('products')
                    .insert([{
                        name: name,
                        price: price ? parseInt(price) : 0,
                        image_url: publicUrl
                    }]);

                if (insertResult.error) {
                    document.getElementById('upload-status').textContent = 'Insert error: ' + insertResult.error.message;
                    return;
                }

                document.getElementById('upload-status').textContent = 'Product added!';
                
                // Clear form
                document.getElementById('product-name').value = '';
                document.getElementById('product-price').value = '';
                document.getElementById('image-picker').value = '';
                
                // Reload product list
                loadProducts();

            } catch(e) {
                document.getElementById('upload-status').textContent = 'Crash: ' + e.message;
            }
        }
    </script>
</body>
</html>

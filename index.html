<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abihani Express</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="product"></div>

    <script>
        // === CONFIGURATION ===
        const supabaseUrl = 'https://eljgjxoptjxwdpuvzkpp.supabase.co';
        const supabaseKey = 'sb_publishable_RYlO1vwmzFViNl_68dDQ3Q_IfsRPIxZ';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // === FETCH AND DISPLAY ===
        async function loadProduct() {
            const { data, error } = await supabase
                .from('products')
                .select('*')
                .eq('id', 1)
                .single();

            if (error) {
                document.getElementById('product').textContent = 'Error: ' + error.message;
                return;
            }

            // data.name and data.image_url come from the database — NOT hardcoded
            document.getElementById('product').innerHTML = `
                <h2>${data.name}</h2>
                <img src="${data.image_url}" alt="${data.name}" style="max-width:400px;border-radius:12px;">
            `;
        }

        loadProduct();
    </script>
</body>
</html>

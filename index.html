<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav Test</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .page { display: none; padding: 20px; text-align: center; }
        .page.active { display: block; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #fdf9f5;
            border-top: 1px solid #e8dfd6;
            padding: 8px 16px 12px;
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            color: #a6947e;
            font-size: 10px;
            transition: color 0.2s;
        }
        .nav-item.active { color: #b87c4f; transform: scale(1.1); }
        .nav-item i { font-size: 18px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div id="home" class="page active"><h2>Home</h2></div>
    <div id="shop" class="page"><h2>Shop</h2></div>
    <div id="search" class="page"><h2>Search</h2></div>
    <div id="profile" class="page"><h2>Profile</h2></div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="showPage('home', this)"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="nav-item" onclick="showPage('shop', this)"><i class="fas fa-th-large"></i><span>Shop</span></button>
        <button class="nav-item" onclick="showPage('search', this)"><i class="fas fa-search"></i><span>Search</span></button>
        <button class="nav-item" onclick="showPage('profile', this)"><i class="fas fa-user"></i><span>Profile</span></button>
    </div>

    <script>
    function showPage(name, btn) {
        document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
        document.getElementById(name).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
        btn.classList.add('active');
    }
    </script>

</body>
</html>
